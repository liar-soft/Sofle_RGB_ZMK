name: Build ZMK Firmware

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: zmkfirmware/zmk-build-arm:3.5
    strategy:
      matrix:
        config:
          - { shield: sofle_left, board: nice_nano_v2 }
          - { shield: sofle_right, board: nice_nano_v2 }
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache west modules
        uses: actions/cache@v4
        with:
          path: |
            .west
            modules/
            tools/
            zephyr/
            bootloader/
            zmk/
          key: ${{ runner.os }}-west-${{ hashFiles('config/west.yml') }}

      - name: West Init
        run: west init -l config

      - name: West Update
        run: west update

      - name: West Zephyr Export
        run: west zephyr-export

      - name: Build
        run: |
          west build -s zmk/app -d build/${{ matrix.config.shield }} \
            -b ${{ matrix.config.board }} -- -DSHIELD=${{ matrix.config.shield }}

      - name: Archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.shield }}
          path: build/${{ matrix.config.shield }}/zephyr/zmk.uf2